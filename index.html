<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reproductor — Shell de diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#121212;
  --surface:#181818;
  --surface-2:#282828;
  --line:#2a2a2a;
  --text:#ffffff;
  --muted:#b3b3b3;
  --accent:#1db954;
  --accent-2:#1ed760;
  --accent-glow:rgba(29,185,84,.35);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:var(--bg); color:var(--text); overflow:hidden;
  user-select:none; -webkit-tap-highlight-color:transparent;
}
body{
  background:#05040a;
  color:var(--text);
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ---------- Marco de teléfono (solo para la demo en escritorio) ---------- */
.phone{
  position:relative;width:390px;height:844px;max-width:100vw;max-height:100vh;
  background:var(--bg);overflow:hidden;
  border-radius:38px;box-shadow:0 40px 90px rgba(0,0,0,.7), 0 0 0 1px #241f33;
}
@media (max-width:430px),(max-height:860px){
  .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none}
}

/* ---------- Pantallas ---------- */
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:max(env(safe-area-inset-top),10px) 0 calc(var(--nav-h) + 78px);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .22s ease, transform .22s ease;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.active{opacity:1;pointer-events:auto;transform:none}

.pad{padding:0 20px}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1.title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:6px 0 22px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 14px}
.section-head h2{font-size:17px;font-weight:700;letter-spacing:-.01em}
.section-head a{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}

/* carátulas */
.art{border-radius:10px;position:relative;overflow:hidden;flex:none;background:#211d2e}
.art::after{content:'';position:absolute;inset:0;z-index:0;background:
  radial-gradient(circle at 30% 25%, rgba(255,255,255,.22), transparent 55%),
  linear-gradient(150deg, var(--c1), var(--c2));}
.art .art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.art.round{border-radius:50%}

/* ---------- Inicio ---------- */
.apphead{text-align:center;padding:6px 20px 4px}
.apphead h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
.apphead p{color:var(--muted);font-size:13px;margin-top:4px}
.hero-greet{font-size:24px;font-weight:800;letter-spacing:-.02em}
.hero-sub{color:var(--muted);font-size:14px;margin-top:4px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.quick button{
  display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:10px;padding:0;height:56px;color:var(--text);font:inherit;font-size:13px;font-weight:700;
  overflow:hidden;text-align:left;cursor:pointer;transition:background .15s;
}
.quick button:hover{background:#232032}
.quick .art{width:56px;height:56px;border-radius:0}
.shelf{display:flex;gap:14px;overflow-x:auto;padding:2px 20px 4px;scrollbar-width:none}
.shelf::-webkit-scrollbar{display:none}
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 24px 24px; }
.quick-grid > div { display:flex; align-items:center; background:#2a2a2a; border-radius:6px; overflow:hidden; gap:8px; padding-right:12px; cursor:pointer; }
.quick-grid > div .art { width:56px; height:56px; border-radius:0; flex-shrink:0; }
.card{width:136px;flex:none;cursor:pointer}
.card .art{width:136px;height:136px;box-shadow:0 8px 22px rgba(0,0,0,.5)}
.card h3{font-size:13.5px;font-weight:700;margin-top:10px;line-height:1.3}
.card p{font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- Listas de canciones ---------- */
.row{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;transition:background .15s}
.row:hover{background:rgba(255,255,255,.035)}
.row .art{width:44px;height:44px}
.row .meta{flex:1;min-width:0}
.row .meta h4{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta p{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .dur{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.row .kebab{color:var(--muted);padding:4px;display:flex}
.row.playing .meta h4{color:var(--accent)}

/* ---------- Buscar ---------- */
.searchbar{display:flex;align-items:center;gap:10px;padding:6px 20px 0}
.searchbar .field{
  flex:1;display:flex;align-items:center;gap:9px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:11px;padding:0 12px;height:44px;
}
.searchbar input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font:inherit;font-size:14.5px;
}
.searchbar input::placeholder{color:var(--muted)}
.searchbar .cancel{background:none;border:none;color:var(--accent);font:inherit;font-size:15px;font-weight:600;cursor:pointer;display:none}
.searchbar.typing .cancel{display:block}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;padding:6px}

.tabs{display:flex;gap:8px;overflow-x:auto;padding:16px 20px 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);
  font:inherit;font-size:13px;font-weight:700;padding:7px 15px;border-radius:999px;cursor:pointer;
  transition:.15s;
}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px}
.chip{
  display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600;color:#cfc9dd;cursor:pointer;
}
.chip .x{color:var(--muted);display:flex}

.trend{display:flex;gap:12px;overflow-x:auto;padding:2px 20px;scrollbar-width:none}
.trend::-webkit-scrollbar{display:none}
.trend-item{width:104px;flex:none;position:relative;cursor:pointer}
.trend-item .art{width:104px;height:104px}
.trend-item .rank{
  position:absolute;top:6px;left:6px;z-index:2;width:20px;height:20px;border-radius:6px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:grid;place-items:center;
  font-size:11px;font-weight:800;
}
.trend-item h4{font-size:12.5px;font-weight:700;margin-top:8px;line-height:1.25}
.trend-item p{font-size:11.5px;color:var(--muted);margin-top:2px}

.artist-row{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer}
.artist-row .art{width:46px;height:46px;border-radius:50%}
.artist-row .meta h4{font-size:14.5px;font-weight:600}
.artist-row .meta p{font-size:12.5px;color:var(--muted);margin-top:2px}
.artist-row .chev{margin-left:auto;color:var(--muted);display:flex}

.empty{padding:60px 30px;text-align:center;color:var(--muted)}
.empty h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.5}

/* ---------- Mini reproductor (barra completa, estilo Spotify) ---------- */
.mini{
  position:fixed; left:0; right:0; bottom:var(--nav-h); height:56px;
  background:#2a2a2a;
  display:flex; align-items:center; padding:0 10px; gap:10px; z-index:99;
  transform:translateY(150%);
  transition:transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  border-top:1px solid rgba(255,255,255,.06);
}
.mini.up{ transform:translateY(0); }
.mini .art{width:38px;height:38px;border-radius:4px}
.mini .meta{flex:1;min-width:0}
.mini .meta h4{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .meta p{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .mini-bar{position:absolute;left:0;right:0;top:0;height:2px;background:rgba(255,255,255,.1);overflow:hidden}
.mini .mini-bar i{display:block;height:100%;background:var(--accent);width:0}
#mPlay{color:#fff;flex:none}

/* ---------- Nav inferior (barra completa, estilo Spotify) ---------- */
.nav{
  position:fixed; bottom:0; left:0; right:0; height:var(--nav-h);
  background:#000000; border-top:1px solid #2a2a2a;
  display:flex; justify-content:space-around; align-items:center;
  padding-bottom:env(safe-area-inset-bottom); z-index:100;
}
.nav button{
  background:none;border:none;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;flex:1;height:100%;font-size:10px;font-weight:600;
  transition:color .15s;
}
.nav button.active{color:#fff}
.home-ind{display:none}

/* ---------- Reproductor a pantalla completa ---------- */
.player{
  position:absolute;inset:0;z-index:150;background:#000;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.85,.3,1);
  overflow:hidden;
}
.player.open{transform:none}
.player-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;padding-bottom:24px}
.player-inner::-webkit-scrollbar{display:none}

.player-top{display:flex;flex-direction:column;align-items:center;padding:max(env(safe-area-inset-top),32px) 20px 16px}
.player-top .label{font-size:14px;font-weight:700;letter-spacing:0;color:#fff;margin-bottom:4px}
.player-top .sub{font-size:13px;font-weight:500;color:rgba(255,255,255,0.6)}
.player-top-down{position:absolute;left:20px;top:max(env(safe-area-inset-top),32px);color:#fff;background:none;border:none;padding:4px;cursor:pointer}

.stage{padding:0 24px 24px;display:flex;justify-content:center;margin-top:auto}
.cover-square{width:100%;max-width:320px;aspect-ratio:1;border-radius:18px;object-fit:cover;box-shadow:0 12px 40px rgba(0,0,0,0.5);transition: transform 0.3s ease, box-shadow 0.3s ease;}
.player.playing .cover-square {transform: scale(1.03);box-shadow: 0 16px 50px rgba(0,0,0,0.7);}

.track-info{display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px}
.track-info .txt{flex:1;min-width:0}
.track-info h2{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.2;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-info .artist{font-size:15px;font-weight:500;color:rgba(255,255,255,0.6);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-actions{display:flex;gap:16px;align-items:center}
.track-actions button{background:none;border:none;color:rgba(255,255,255,.65);display:grid;place-items:center;cursor:pointer;transition:transform 0.1s,color .15s;padding:4px}
.track-actions button:active{transform:scale(0.9)}
.track-actions button svg{width:22px;height:22px}
.track-actions button.like.on{color:var(--accent)}
.track-actions button.like.on svg{fill:currentColor}

.seek{padding:18px 24px 4px}
.seek .bar{height:4px;background:rgba(255,255,255,.24);border-radius:4px;position:relative;cursor:pointer}
.seek .bar .fill{height:100%;background:#fff;border-radius:4px;width:0}
.seek .bar .knob{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);left:0;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.seek .times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.6);margin-top:8px;font-weight:600;font-variant-numeric:tabular-nums}

.controls{display:flex;align-items:center;justify-content:space-between;padding:6px 22px 28px}
.controls button{background:none;border:none;color:#fff;cursor:pointer;display:grid;place-items:center;transition:transform 0.1s;padding:8px}
.controls button:active{transform:scale(0.92)}
.controls button.sm{color:rgba(255,255,255,.55)}
.controls button.sm.on{color:var(--accent)}
.play-btn{
  width:56px;height:56px;border-radius:50%;flex:none;
  background:#fff;color:#000;
}
.play-btn svg{width:24px;height:24px;fill:currentColor;margin-left:2px}

.util-bar{display:flex;align-items:center;justify-content:space-between;padding:0 24px 32px;gap:12px;margin-top:auto}
.util-btn{flex:1;height:48px;border-radius:24px;background:#1e1e1e;border:none;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:14px;cursor:pointer}
.util-btn.circle{flex:0 0 48px;padding:0}

/* ---------- Aviso emergente (toast) ---------- */
#toast{
  position:absolute;left:50%;bottom:calc(var(--nav-h) + 82px);
  transform:translateX(-50%) translateY(12px);
  background:rgba(20,16,32,.96);border:1px solid var(--line);color:var(--text);
  font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:11px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:82%;text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%)}

/* Reproductor de YouTube oculto (solo audio) */
#ytHost{position:absolute;width:1px;height:1px;left:-9999px;top:0;opacity:0;pointer-events:none}

/* panel inferior del reproductor */
.panel{margin-top:16px;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--line);padding:6px 0 30px;min-height:150px}
.panel-grip{width:38px;height:4px;border-radius:4px;background:#3a3450;margin:8px auto 0}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 10px}
.panel-head h3{font-size:15px;font-weight:700}
.panel-head button{background:none;border:none;color:var(--accent);font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.queue-row{display:flex;align-items:center;gap:11px;padding:8px 20px}
.queue-row .grip{color:#4b4463;display:flex;cursor:grab}
.queue-row .art{width:38px;height:38px}
.queue-row .meta{flex:1;min-width:0}
.queue-row .meta h4{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-row .meta p{font-size:11.5px;color:var(--muted);margin-top:2px}
.queue-row .dur{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}

.lyrics{padding:4px 24px 0;color:#b8b1cc;font-size:15px;line-height:1.85;font-weight:500}
.lyrics-empty{padding:8px 24px 0;color:var(--muted);font-size:13.5px;line-height:1.6}
.lyrics-empty button{
  margin-top:14px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  font:inherit;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;
}
.lyrics-empty button:hover{border-color:var(--accent)}

svg{display:block}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="phone">

  <!-- Reproductor de YouTube oculto (motor de audio real) -->
  <div id="ytHost"></div>

  <!-- ============ INICIO ============ -->
  <section class="screen active" id="s-home">
    <div id="ptr-indicator" style="text-align:center; padding:0; color:var(--muted); height:0; overflow:hidden; transition:height 0.2s; font-size:13px; font-weight:600; display:grid; place-items:center;">
      <span style="opacity:0; transition:opacity 0.2s;" id="ptr-text">Baja para refrescar</span>
    </div>
    <div class="pad" style="padding-top: max(env(safe-area-inset-top), 24px); padding-bottom: 16px; display:flex; align-items:center; gap:8px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text);"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <h1 style="font-size:26px;font-style:italic;font-weight:900;margin:0;letter-spacing:-1px;">OpenTune</h1>
      <div style="flex:1"></div>
    </div>
    

<div class="pad section-head" style="margin-top:16px;"><h2>Sigue escuchando</h2></div><div class="quick-grid" id="quickGrid"></div>

    <div class="pad section-head"><h2>Escuchado recientemente</h2><a href="#" data-goto="library">Ver todo</a></div>
    <div class="shelf" id="recentShelf"></div>

    <div class="pad section-head"><h2>Tus mezclas</h2><a href="#" data-goto="library">Ver todo</a></div>
    <div class="shelf" id="mixShelf"></div>

    <div class="pad section-head"><h2>Sonó mucho esta semana</h2></div>
    <div id="homeList"></div>
  </section>

  <!-- ============ BUSCAR ============ -->
  <section class="screen" id="s-search">
    <div class="searchbar" id="searchBar">
      <div class="field">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="searchInput" type="search" placeholder="Buscar canciones, artistas, álbumes…" autocomplete="off">
        <button class="icon-btn" id="clearSearch" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" opacity=".35"/><path d="M15 9l-6 6M9 9l6 6" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <button class="icon-btn" title="Buscar por voz">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
      </button>
      <button class="icon-btn" title="Filtros">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M7 12h10M10 17h4"/></svg>
      </button>
      <button class="cancel" id="cancelSearch">Cancelar</button>
    </div>

    <div class="tabs" id="searchTabs">
      <button class="tab active">Todo</button>
      <button class="tab">Canciones</button>
      <button class="tab">Artistas</button>
      <button class="tab">Álbumes</button>
      <button class="tab">Videos</button>
    </div>

    <div id="searchIdle">
      <div class="pad section-head"><h2>Búsquedas recientes</h2><a href="#" id="clearRecents">Limpiar</a></div>
      <div class="chips" id="recentChips"></div>

      <div class="pad section-head"><h2>Historial de reproducción</h2></div>
      <div class="trend" id="historyRow"></div>
    </div>

    <div id="searchResults" style="display:none"></div>
  </section>

  <!-- ============ BIBLIOTECA ============ -->
  <section class="screen" id="s-library">
    <div class="pad" style="padding-top:12px; display:flex; align-items:center; justify-content:space-between;">
      <div>
        <p class="eyebrow">Guardado por ti</p>
        <h1 class="title" style="margin-bottom:0">Biblioteca</h1>
      </div>
      <button class="icon-btn" id="addFolderBtn" title="Crear carpeta" style="color:var(--text)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div style="height:14px"></div>
    <div id="libraryList"></div>
  </section>

  <!-- ============ MINI PLAYER ============ -->
  <div class="mini" id="miniPlayer">
    <div id="mArt"></div>
    <div class="meta" id="mMeta" style="margin-left:12px;">
      <h4 id="mTitle"></h4>
      <p id="mArtist"></p>
    </div>
    <button class="icon-btn" id="mPlay" style="margin-right:4px; width:48px; height:48px; display:flex; align-items:center; justify-content:center;">
    </button>
    <div class="mini-bar"><i id="mBar"></i></div>
  </div>

  <!-- ============ NAV ============ -->
  <nav class="nav" id="nav">
    <button data-tab="home" class="active">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5 2 10.5V21a1 1 0 0 0 1 1h6v-7h6v7h6a1 1 0 0 0 1-1V10.5z"/></svg>
      Inicio
    </button>
    <button data-tab="search">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><circle cx="11" cy="11" r="7.5"/><path d="m20.5 20.5-4-4"/></svg>
      Buscar
    </button>
    <button data-tab="library">

<script>
/* ============================================================
   Datos de demostración. Cuando conectemos la API de YouTube,
   esta lista se reemplaza por los resultados reales.
   ============================================================ */
const G = [
  ['#7f5af0','#231942'], ['#c026d3','#4a044e'], ['#8b5cf6','#1e1b4b'],
  ['#a855f7','#312e81'], ['#d946ef','#3b0764'], ['#6d28d9','#0f0a24'],
  ['#e879f9','#581c87'], ['#9333ea','#1a1035']
];
let gi = 0;
const grad = () => G[gi++ % G.length];

const mk = (title, artist, dur, yt, cover = null) => {
  const g = grad();
  return { title, artist, dur, yt, cover, album: title, c1: g[0], c2: g[1] };
};

/* Canciones recomendadas (se cargan dinámicamente) */
let LIB = [];

/* ---------- estado ---------- */
const state = {
  tab:'home', idx:0, playing:false, t:0,
  shuffle:false, repeat:false,
  view:'queue',          // 'queue' | 'lyrics'
  queue: [],
  recents: [],
  history: [],
  timer: null, loadedId: null
};
try { state.history = JSON.parse(localStorage.getItem('openTuneHistory')) || []; } catch(e) {}
const cur = () => LIB[state.idx] || mk('Buscando éxitos...','Conectando',0,'');
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

// --- ROTACIÓN DE API KEYS PARA LA APK ---
const YOUTUBE_KEYS = [
  'AIzaSyCWciQ2xa2DkGR9eQBnArMi2lp_WR9zDf0',
  'AIzaSyBpbBeoRdOdBKBcwwL2Vk2ayxkBGmqqi0w',
  'AIzaSyCSnJhjXLaTJ9LYfkujDJt6a-Pjy29IvNA',
  'AIzaSyBqiKrUmPKeMqB7Y3K9jc4Kjs8DUYd-YQw',
  'AIzaSyC3X8NcrqgUULufh40XGLICohRmVSziKZk'
];
let currentKeyIndex = 0;

async function searchYouTube(q) {
  if (!YOUTUBE_KEYS.length || YOUTUBE_KEYS[0] === 'TU_API_KEY_1') {
    return { error: 'Falta configurar las YOUTUBE_KEYS en el código.' };
  }
  for (let i = 0; i < YOUTUBE_KEYS.length; i++) {
    const key = YOUTUBE_KEYS[currentKeyIndex];
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=15&safeSearch=moderate&q=${encodeURIComponent(q)}&key=${key}`;
    try {
      const r = await fetch(url);
      const data = await r.json();
      if (data.error) {
        console.warn('Llave falló, rotando:', currentKeyIndex, data.error.message);
        currentKeyIndex = (currentKeyIndex + 1) % YOUTUBE_KEYS.length;
        continue;
      }
      const decode = s => String(s || '').replace(/&amp;/g, '&').replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      const items = (data.items || []).filter(it => it.id && it.id.videoId).map(it => ({
        yt: it.id.videoId,
        title: decode(it.snippet.title),
        artist: decode(it.snippet.channelTitle),
        thumb: (it.snippet.thumbnails && it.snippet.thumbnails.medium && it.snippet.thumbnails.medium.url) || ''
      }));
      return { items };
    } catch(e) {
      console.warn('Error de red, rotando llave:', currentKeyIndex);
      currentKeyIndex = (currentKeyIndex + 1) % YOUTUBE_KEYS.length;
    }
  }
  return { error: 'Todas las llaves han fallado.' };
}

/* Quita acentos para que "corazon" encuentre "corazón" y viceversa */
const normalize = s => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

/* Palabras que indican una VERSIÓN concreta de la canción. Si el usuario
   las pide, esa versión sube al top; si no las pide, se prioriza el
   original y las versiones raras/no pedidas bajan. */
const VERSION_WORDS = ['remix','acustico','en vivo','live','cover','instrumental','version','sped up','slowed','extended','radio edit','karaoke','mix'];

function rankByRelevance(query, items){
  const qNorm = normalize(query);
  const qTokens = qNorm.split(/\s+/).filter(Boolean);
  const scored = items.map(it => {
    const titleNorm = normalize(it.title);
    const artistNorm = normalize(it.artist);
    let score = 0;
    qTokens.forEach(tok => {
      if (titleNorm.includes(tok)) score += 3;
      else if (artistNorm.includes(tok)) score += 1;
    });
    if (titleNorm.includes(qNorm)) score += 6;
    VERSION_WORDS.forEach(vw => {
      const wants = qNorm.includes(vw);
      const has = titleNorm.includes(vw);
      if (wants && has) score += 8;        // pidió esa versión y la encontró
      else if (wants && !has) score -= 4;  // pidió esa versión, esta no lo es
      else if (!wants && has) score -= 2;  // no la pidió, es una versión rara
    });
    return { it, score };
  });
  return scored.filter(s => s.score > 0).sort((a,b) => b.score - a.score).map(s => s.it);
}

async function searchAppleMusic(q) {
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=25`);
    const data = await r.json();
    const items = (data.results || []).map(it => ({
      title: it.trackName,
      artist: it.artistName,
      thumb: it.artworkUrl100 ? it.artworkUrl100.replace('100x100bb', '600x600bb') : '',
      yt: null // se obtendrá bajo demanda
    }));
    return { items: rankByRelevance(q, items) };
  } catch(e) {
    return { error: 'Error al conectar con Apple Music.' };
  }
}

const artEl = (t, cls='') => {
  const d = document.createElement('div');
  d.className = 'art ' + cls;
  d.style.setProperty('--c1', t.c1); d.style.setProperty('--c2', t.c2);
  if (t.cover) {
    const img = document.createElement('img');
    img.className = 'art-img'; img.alt = '';
    img.src = t.cover;
    d.append(img);
  } else if(t.yt){
    // Carátula real: miniatura del video de YouTube (con degradado de respaldo detrás)
    const img = document.createElement('img');
    img.className = 'art-img'; img.alt = '';
    const hi = cls.includes('cover');           // carátula grande del reproductor
    const srcs = hi ? ['maxresdefault','hqdefault','0'] : ['mqdefault','hqdefault','0'];
    let k = 0;
    const set = () => img.src = 'https://i.ytimg.com/vi/' + t.yt + '/' + srcs[k] + '.jpg';
    img.onload = () => { if(img.naturalWidth === 120 && k < srcs.length - 1){ k++; set(); } };
    img.onerror = () => { k++; if(k < srcs.length) set(); else img.remove(); };
    set();
    d.append(img);
  }
  return d;
};

const ICON = {
  play:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5z"/></svg>',
  pause:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="4.5" width="4" height="15" rx="1.3"/><rect x="13.5" y="4.5" width="4" height="15" rx="1.3"/></svg>',
  playBig:'<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5z"/></svg>',
  pauseBig:'<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4.2" height="16" rx="1.5"/><rect x="13.8" y="4" width="4.2" height="16" rx="1.5"/></svg>',
  kebab:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg>',
  grip:'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.6"/><circle cx="15" cy="5" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="19" r="1.6"/><circle cx="15" cy="19" r="1.6"/></svg>',
  chev:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>',
  x:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>'
};

/* ---------- render: filas ---------- */
function songRow(t, i, opts={}){
  const r = document.createElement('div');
  r.className = 'row' + (i === state.idx ? ' playing' : '');
  r.append(artEl(t));
  const m = document.createElement('div');
  m.className = 'meta';
  m.innerHTML = `<h4></h4><p></p>`;
  m.querySelector('h4').textContent = t.title;
  m.querySelector('p').textContent = t.artist;
  r.append(m);
  const d = document.createElement('span');
  d.className = 'dur'; d.textContent = fmt(t.dur);
  r.append(d);
  const k = document.createElement('span');
  k.className = 'kebab'; k.innerHTML = ICON.kebab;
  k.onclick = e => { e.stopPropagation(); addToQueue(i); };
  r.append(k);
  r.onclick = () => { state.idx = i; state.t = 0; play(true); openPlayer(); };
  return r;
}

function addToQueue(i){
  if(!state.queue.includes(i)) state.queue.push(i);
  toast('Añadida a la cola: ' + LIB[i].title);
  renderPanel();
}

/* Canciones semilla para cuando aún no hay historial de escucha.
   Solo título+artista (sin ID de YouTube fijo): la portada se busca en Apple
   Music (sin límite de cuota) y el audio se resuelve en vivo con las
   YOUTUBE_KEYS al reproducir, igual que el resto de la app. Así nunca se
   queda con una portada rota ni un ID de video que ya no existe. */
const SEED_SONGS = [
  {title:'PERRO NEGRO', artist:'Bad Bunny, Feid'},
  {title:'QLONA', artist:'Karol G, Peso Pluma'},
  {title:'LADY GAGA', artist:'Peso Pluma, Gabito Ballesteros, Junior H'},
  {title:'UN PREVIEW', artist:'Bad Bunny'},
  {title:'LUNA', artist:'Feid, ATL Jacob'},
  {title:'MI EX TENÍA RAZÓN', artist:'Karol G'},
  {title:'MONACO', artist:'Bad Bunny'},
  {title:'PROVENZA', artist:'Karol G'},
  {title:'LA JUMPA', artist:'Arcangel, Bad Bunny'},
  {title:'Lala', artist:'Myke Towers'},
  {title:'CLASSY 101', artist:'Feid, Young Miko'},
  {title:'TQM', artist:'Fuerza Regida'}
];
let _seedCache = null;
async function getSeedTracks(){
  if(_seedCache) return _seedCache;
  _seedCache = await Promise.all(SEED_SONGS.map(async s => {
    let cover = null;
    try{
      const data = await searchAppleMusic(s.artist + ' ' + s.title);
      const hit = data.items && data.items.find(it => it.thumb);
      if(hit) cover = hit.thumb;
    }catch(e){}
    return mk(s.title, s.artist, 0, null, cover);
  }));
  return _seedCache;
}

/* ---------- construir pantallas ---------- */
async function buildHome(force = false){
  const q = $('#quickGrid');
  const rs = $('#recentShelf');
  const ms = $('#mixShelf');
  const hl = $('#homeList');
  
  if (force) toast('Refrescando inicio...');

  let historyTracks = state.history || [];
  if(historyTracks.length === 0){
    historyTracks = await getSeedTracks();
  }

  q.innerHTML = '';
  historyTracks.slice(0,6).forEach((t)=>{
    const c = document.createElement('div');
    const a = artEl(t);
    const text = document.createElement('span');
    text.style.cssText = 'font-size:13px; font-weight:700; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.2;';
    text.textContent = t.title;
    c.append(a, text);
    c.onclick = () => playExternal(t);
    q.append(c);
  });

  const shelf = (el, items, sub, onClick) => {
    el.innerHTML = '';
    items.forEach((t)=>{
      const c = document.createElement('div');
      c.style.cssText = 'flex:0 0 140px; display:flex; flex-direction:column; gap:8px; cursor:pointer;';
      const a = artEl(t);
      a.style.width = '140px'; a.style.height = '140px'; a.style.borderRadius = '16px';
      c.append(a);
      const m = document.createElement('div'); m.className='meta';
      m.innerHTML = '<h4 style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;"></h4><p style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;"></p>';
      m.querySelector('h4').textContent = t.title || t.name;
      m.querySelector('p').textContent = sub ? sub(t) : t.artist;
      c.append(m);
      c.onclick = () => onClick ? onClick(t) : playExternal(t);
      el.append(c);
    });
  };

  if (historyTracks.length > 0) {
    shelf(rs, historyTracks.slice(0,10));
  }
  
  const artists = [...new Set(historyTracks.map(t => (t.artist || '').split(',')[0].trim()).filter(Boolean))];
  const mixItems = artists.slice(0, 10).map(a => {
    const t = historyTracks.find(x => x.artist.includes(a));
    return { name: `Mix de ${a}`, artist: 'OpenTune', cover: t.cover, mixArtist: a };
  });
  
  shelf(ms, mixItems, () => 'OpenTune', async (mItem) => {
    toast('Generando mix de ' + mItem.mixArtist + '...');
    const data = await searchAppleMusic(mItem.mixArtist + ' oficial');
    if (data.items && data.items.length) {
      const startIndex = LIB.length;
      data.items.sort(() => Math.random() - 0.5);
      for(let it of data.items) LIB.push(mk(it.title, it.artist, 0, null, it.thumb));
      loadTrack(startIndex, true); openPlayer();
    } else {
      toast('No se pudo generar mix.');
    }
  });

  if (force) {
    const terms = ['reggaeton', 'trap latino', 'latin hits', 'pop latino', 'corridos tumbados', 'exitos'];
    const randomTerm = terms[Math.floor(Math.random() * terms.length)];
    const data = await searchAppleMusic(randomTerm);
    if(data.items && data.items.length > 0) {
       hl.innerHTML = '';
       data.items.slice(0, 5).forEach((t) => {
         const track = mk(t.title, t.artist, 0, null, t.thumb);
         LIB.push(track);
         hl.append(songRow(track, LIB.length - 1));
       });
    }
  } else if (LIB.length === 0) {
    LIB = (await getSeedTracks()).slice(0, 6);
    hl.innerHTML = '';
    LIB.slice(0, 5).forEach((t, i) => hl.append(songRow(t, i)));
    loadTrack(0, false);
    buildSearchIdle(); buildLibrary();
  }
}

function buildSearchIdle(){
  const chips = $('#recentChips'); chips.innerHTML = '';
  state.recents.forEach(term=>{
    const c = document.createElement('div'); c.className='chip';
    const s = document.createElement('span'); s.textContent = term;
    const x = document.createElement('span'); x.className='x'; x.innerHTML = ICON.x;
    x.onclick = e => { e.stopPropagation(); state.recents = state.recents.filter(r=>r!==term); buildSearchIdle(); };
    c.append(s,x);
    c.onclick = () => { $('#searchInput').value = term; runSearch(term); };
    chips.append(c);
  });

  const tr = $('#historyRow'); 
  if(!tr) return;
  tr.innerHTML = '';
  if(!state.history || state.history.length === 0) {
    tr.innerHTML = '<div style="padding:0 24px;color:var(--muted)">No has escuchado nada aún.</div>';
    return;
  }
  state.history.slice(0,10).forEach((t)=>{
    const d = document.createElement('div'); d.className='trend-item';
    d.append(artEl(t));
    const h = document.createElement('h4'); h.textContent = t.title;
    const p = document.createElement('p'); p.textContent = t.artist;
    d.append(h,p);
    d.onclick = () => { 
      let idx = LIB.findIndex(x => x.yt === t.yt);
      if(idx === -1) { idx = LIB.length; LIB.push(t); }
      state.idx = idx; state.t=0; play(true); openPlayer(); 
    };
    tr.append(d);
  });
}

let searchSeq = 0, ytTimer = null;
function runSearch(q){
  const res = $('#searchResults'), idle = $('#searchIdle');
  if(!q.trim()){ res.style.display='none'; idle.style.display=''; clearTimeout(ytTimer); return; }
  
  if(!state.recents.includes(q.trim())) {
    state.recents.unshift(q.trim());
    if(state.recents.length > 10) state.recents.pop();
    buildSearchIdle();
  }
  
  idle.style.display='none'; res.style.display=''; res.innerHTML='';
  const term = q.toLowerCase();
  const hits = LIB.filter(t => (t.title+' '+t.artist).toLowerCase().includes(term));
  const artists = [...new Set(LIB.filter(t=>t.artist.toLowerCase().includes(term)).map(t=>t.artist.split(',')[0]))];

  if(artists.length){
    res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>Artistas</h2></div>`);
    artists.slice(0,3).forEach(a=>{
      const t = LIB.find(x=>x.artist.startsWith(a));
      const r = document.createElement('div'); r.className='artist-row';
      r.append(artEl(t));
      const m = document.createElement('div'); m.className='meta';
      m.innerHTML = '<h4></h4><p>Artista</p>';
      m.querySelector('h4').textContent = a;
      r.append(m);
      const c = document.createElement('span'); c.className='chev'; c.innerHTML = ICON.chev;
      r.append(c);
      res.append(r);
    });
  }
  if(hits.length){
    res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>En tu biblioteca</h2></div>`);
    hits.slice(0,8).forEach(t => res.append(songRow(t, LIB.indexOf(t))));
  }
  // Búsqueda en vivo en YouTube (con debounce para no gastar cuota de más)
  scheduleYT(q);
}

function scheduleYT(q){
  clearTimeout(ytTimer);
  const seq = ++searchSeq;
  ytTimer = setTimeout(() => fetchYT(q, seq), 350);
}

async function fetchYT(q, seq){
  const res = $('#searchResults');
  res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>En YouTube</h2></div>`);
  const loading = document.createElement('div');
  loading.className = 'empty'; loading.style.padding = '24px';
  loading.innerHTML = '<p>Buscando en YouTube…</p>';
  res.append(loading);
  try{
    const data = await searchYouTube(q);
    if(seq !== searchSeq) return;
    loading.remove();
    if(data.error){
      const e = document.createElement('div'); e.className='empty'; e.style.padding='18px 24px';
      e.innerHTML = `<p>${data.error}</p>`;
      res.append(e); return;
    }
    if(!data.items || !data.items.length){
      const e = document.createElement('div'); e.className='empty'; e.style.padding='18px 24px';
      e.innerHTML = '<p>Sin resultados en YouTube.</p>';
      res.append(e); return;
    }
    const ranked = rankByRelevance(q, data.items);
    (ranked.length ? ranked : data.items).forEach(it => res.append(ytRow({ yt:it.yt, title:it.title, artist:it.artist, dur:0, cover:it.thumb })));
  }catch(e){
    if(seq !== searchSeq) return;
    loading.remove();
  }
}

function ytRow(t){
  const r = document.createElement('div'); r.className='row';
  r.append(artEl(t));
  const m = document.createElement('div'); m.className='meta';
  m.innerHTML = '<h4></h4><p></p>';
  m.querySelector('h4').textContent = t.title;
  m.querySelector('p').textContent = t.artist;
  r.append(m);
  const k = document.createElement('span'); k.className='kebab'; k.innerHTML = ICON.play;
  r.append(k);
  r.onclick = () => playExternal(t);
  return r;
}

// Reproduce una canción encontrada en Apple Music o el historial
function playExternal(t){
  let i = LIB.findIndex(x => x.title === t.title && x.artist === t.artist);
  if(i < 0){
    const g = grad();
    const newT = { ...t, c1: g[0], c2: g[1], album: t.album || t.title, dur: t.dur || 0 };
    LIB.push(newT); i = LIB.length - 1;
  }
  state.idx = i;
  loadTrack(i, true); openPlayer();
}

/* ---------- Biblioteca: "Me gusta" + carpetas (local por ahora, luego irá a la BD) ---------- */
try { state.likes = JSON.parse(localStorage.getItem('openTuneLikes')) || []; } catch(e) { state.likes = []; }
try { state.folders = JSON.parse(localStorage.getItem('openTuneFolders')) || []; } catch(e) { state.folders = []; }

const likeKey = t => (t.title || '') + '|' + (t.artist || '');
const isLiked = t => state.likes.some(x => likeKey(x) === likeKey(t));
function saveLikes(){ try { localStorage.setItem('openTuneLikes', JSON.stringify(state.likes)); } catch(e) {} }
function saveFolders(){ try { localStorage.setItem('openTuneFolders', JSON.stringify(state.folders)); } catch(e) {} }

function toggleLike(t){
  const on = !isLiked(t);
  if(on) state.likes.unshift({ title:t.title, artist:t.artist, yt:t.yt||null, cover:t.cover||null, c1:t.c1, c2:t.c2 });
  else state.likes = state.likes.filter(x => likeKey(x) !== likeKey(t));
  saveLikes();
  buildLibrary();
  return on;
}

function buildLibrary(){
  const el = $('#libraryList'); el.innerHTML='';

  // "Me gusta" — siempre visible, se llena solo con lo que el usuario marca con el corazón
  const likeRow = document.createElement('div'); likeRow.className='row';
  const likeIcon = document.createElement('div');
  likeIcon.className='art'; likeIcon.style.cssText='width:52px;height:52px;background:linear-gradient(150deg,var(--accent),#0d5c2e);display:flex;align-items:center;justify-content:center;flex:none';
  likeIcon.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 20.5 4.3 13a4.6 4.6 0 0 1 6.5-6.5l1.2 1.2 1.2-1.2A4.6 4.6 0 1 1 19.7 13z"/></svg>';
  likeRow.append(likeIcon);
  const likeMeta = document.createElement('div'); likeMeta.className='meta';
  likeMeta.innerHTML = '<h4>Me gusta</h4><p></p>';
  likeMeta.querySelector('p').textContent = state.likes.length + (state.likes.length === 1 ? ' canción' : ' canciones');
  likeRow.append(likeMeta);
  likeRow.onclick = () => showLikedSongs();
  el.append(likeRow);

  // Carpetas creadas manualmente (vacías hasta que conectemos la base de datos)
  state.folders.forEach((f, i) => {
    const r = document.createElement('div'); r.className='row';
    const icon = document.createElement('div');
    icon.className='art'; icon.style.cssText='width:52px;height:52px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;flex:none';
    icon.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
    r.append(icon);
    const m = document.createElement('div'); m.className='meta';
    m.innerHTML = '<h4></h4><p>Carpeta vacía</p>';
    m.querySelector('h4').textContent = f.name;
    r.append(m);
    r.onclick = () => toast('Esta carpeta aún no tiene canciones.');
    el.append(r);
  });
}

function showLikedSongs(){
  const el = $('#libraryList'); el.innerHTML='';
  const back = document.createElement('div'); back.className='pad section-head';
  back.innerHTML = '<h2>Me gusta</h2><a href="#">Volver</a>';
  back.querySelector('a').onclick = e => { e.preventDefault(); buildLibrary(); };
  el.append(back);
  if(!state.likes.length){
    el.insertAdjacentHTML('beforeend', '<div class="empty" style="padding:30px"><h3>Aún no tienes canciones con me gusta</h3><p>Toca el corazón en el reproductor para guardarlas aquí.</p></div>');
    return;
  }
  state.likes.forEach((t) => el.append(ytRow(t)));
}

/* ---------- reproductor ---------- */
function renderStage(){
  const t = cur(), st = $('#stage');
  st.innerHTML = '';
  const a = artEl(t,'cover-square');
  st.append(a);
}

function buildWave(){
  const w = $('#wave');
  if(w.childElementCount) return;
  for(let i=0;i<64;i++){
    const b = document.createElement('i');
    const h = 12 + Math.abs(Math.sin(i*.7)*Math.cos(i*.23))*32;
    b.style.height = h.toFixed(1)+'px';
    w.append(b);
  }
  w.onclick = e => {
    const r = w.getBoundingClientRect();
    seekTo(Math.max(0, Math.min(1,(e.clientX-r.left-24)/(r.width-48))) * cur().dur);
  };
}

function renderPanel(){}

function renderTrack(){
  const t = cur();
  $('#pTitle').textContent = t.title;
  $('#pArtist').textContent = t.artist;
  $('#pTopArtist').textContent = t.artist;
  $('#tTot').textContent = fmt(t.dur);
  $('#likeBtn').classList.toggle('on', isLiked(t));
  
  $('#mTitle').textContent = t.title;
  $('#mArtist').textContent = t.artist;
  $('#mArt').innerHTML = ''; $('#mArt').append(artEl(t));
  $('#miniPlayer').classList.add('up');

  renderStage(); renderPanel();
  buildHome();
  if($('#searchInput').value) runSearch($('#searchInput').value);
  paint();
}

/* Solo pinta la barra de progreso, el anillo y la onda según state.t */
function paint(){
  const t = cur();
  const p = t.dur ? Math.min(1, state.t / t.dur) : 0;
  $('#seekFill').style.width = (p*100)+'%';
  $('#seekKnob').style.left = (p*100)+'%';
  $('#mBar').style.width = (p*100)+'%';
  $('#tCur').textContent = fmt(state.t);
}

/* Se ejecuta cada 250 ms mientras suena: lee el tiempo real de YouTube */
function tickReal(){
  const t = cur();
  if(yt && ytReady && t.yt && typeof yt.getCurrentTime === 'function'){
    try{
      const ct = yt.getCurrentTime();
      if(!isNaN(ct)) state.t = ct;
      const d = yt.getDuration();
      if(d && Math.abs(d - t.dur) > 1){ t.dur = d; $('#tTot').textContent = fmt(d); }
    }catch(e){}
  } else {
    if (t.dur > 0) {
      state.t = Math.min(t.dur, state.t + 0.25);
      if(state.t >= t.dur){ next(); return; }
    }
  }
  paint();
}

/* Actualiza solo la UI de reproducción (no manda comandos a YouTube) */
function setPlaying(on){
  state.playing = on;
  $('#playBtn').innerHTML = on ? ICON.pauseBig : ICON.playBig;
  $('#mPlay').innerHTML = on ? ICON.pauseBig : ICON.playBig;
  if(on) {
    $('#player').classList.add('playing');
  } else {
    $('#player').classList.remove('playing');
  }
  clearInterval(state.timer);
  if(on) state.timer = setInterval(tickReal, 250);
}

/* Carga una canción (por índice) y opcionalmente la reproduce */
async function loadTrack(i, autoplay=true){
  state.idx = i; state.t = 0;
  const t = cur();
  
  if(!state.history) state.history = [];
  state.history = state.history.filter(x => x.title !== t.title);
  state.history.unshift(t);
  if(state.history.length > 20) state.history.pop();
  try { localStorage.setItem('openTuneHistory', JSON.stringify(state.history)); } catch(e) {}
  buildSearchIdle();

  renderTrack();
  
  if (!t.yt) {
    toast('Cargando audio...');
    const ytData = await searchYouTube(t.artist + ' ' + t.title + ' audio');
    if (ytData.error) {
      toast('Error: ' + ytData.error);
      setTimeout(next, 2000);
      return;
    }
    if (ytData.items && ytData.items.length > 0) {
      t.ytList = ytData.items.map(x => x.yt);
      t.ytIndex = 0;
      t.yt = t.ytList[0];
    } else {
      toast('No se encontró audio para: ' + t.title);
      setTimeout(next, 2000);
      return;
    }
  }
  
  if(t.yt) loadYT(t.yt, autoplay);
  setPlaying(autoplay);
}

/* Alternar play/pausa de la canción actual */
function play(on){
  const want = on !== undefined ? on : !state.playing;
  const t = cur();
  // Si se pide reproducir una canción que aún no está cargada, la carga
  if(want && (!t.yt || state.loadedId !== t.yt)){ loadTrack(state.idx, true); return; }
  if(yt && ytReady && t.yt){ want ? yt.playVideo() : yt.pauseVideo(); }
  setPlaying(want);
}

/* Saltar a un punto (en segundos) de la canción actual */
function seekTo(sec){
  const t = cur();
  state.t = Math.max(0, Math.min(t.dur || 0, sec));
  if(yt && ytReady && t.yt){ try{ yt.seekTo(state.t, true); }catch(e){} }
  paint();
}

async function next(){
  if(state.repeat) { loadTrack(state.idx, true); return; }
  if(state.shuffle) { loadTrack(Math.floor(Math.random()*LIB.length), true); return; }
  
  if(state.idx === LIB.length - 1) {
    toast('Buscando similares...');
    const artist = cur().artist || cur().title.split('-')[0] || 'Mix';
    try {
      const data = await searchAppleMusic(artist + ' oficial');
      if(data.items && data.items.length) {
        let added = false;
        data.items.sort(() => Math.random() - 0.5);
        for(let it of data.items) {
          if(!LIB.find(x => x.title === it.title && x.artist === it.artist)) {
            LIB.push(mk(it.title, it.artist, 0, null, it.thumb));
            added = true;
          }
        }
        if(!added) {
          // Si todo ya estaba en LIB, agregamos una aleatoria para forzar radio infinito
          const randIt = data.items[Math.floor(Math.random() * data.items.length)];
          LIB.push(mk(randIt.title, randIt.artist, 0, null, randIt.thumb));
        }
        loadTrack(state.idx + 1, true);
        return;
      }
    } catch(e) {}
    toast('No hay más música similar.');
  }
  loadTrack((state.idx + 1) % LIB.length, true);
}
function prev(){
  if(state.t > 4){ seekTo(0); return; }
  loadTrack((state.idx-1+LIB.length)%LIB.length, true);
}
const openPlayer = () => $('#player').classList.add('open');
const closePlayer = () => $('#player').classList.remove('open');

/* ---------- Aviso emergente ---------- */
function toast(msg){
  let el = $('#toast');
  if(!el){ el = document.createElement('div'); el.id = 'toast'; document.querySelector('.phone').append(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ---------- Motor de audio: YouTube IFrame API ---------- */
let yt = null, ytReady = false, pendingId = null;
window.onYouTubeIframeAPIReady = function(){
  yt = new YT.Player('ytHost', {
    height:'1', width:'1',
    playerVars:{ playsinline:1, controls:0, disablekb:1, rel:0, origin: window.location.origin },
    events:{
      onReady: () => { ytReady = true; if(pendingId){ loadYT(pendingId, true); pendingId = null; } },
      onStateChange: onYTState,
      onError: onYTError
    }
  });
};
function loadYT(id, autoplay){
  state.loadedId = id;
  if(!yt || !ytReady){ pendingId = id; return; }
  autoplay ? yt.loadVideoById(id) : yt.cueVideoById(id);
}
function onYTState(e){
  if(e.data === YT.PlayerState.PLAYING){
    const d = yt.getDuration();
    if(d && cur()){ cur().dur = d; $('#tTot').textContent = fmt(d); }
    setPlaying(true);
  } else if(e.data === YT.PlayerState.PAUSED){
    setPlaying(false);
  } else if(e.data === YT.PlayerState.ENDED){
    if (state.t < 2) {
      onYTError();
    } else {
      next();
    }
  }
}
function onYTError(){
  const t = cur();
  if (t.ytList && t.ytIndex !== undefined && t.ytIndex < Math.min(t.ytList.length - 1, 3)) {
    t.ytIndex++;
    t.yt = t.ytList[t.ytIndex];
    if(pendingId) pendingId = t.yt;
    setTimeout(() => {
      if(yt && ytReady) loadYT(t.yt, true);
    }, 600);
    return;
  }
  toast('No se pudo reproducir «' + t.title + '», paso a la siguiente.');
  setTimeout(next, 1500);
}

/* ---------- navegación ---------- */
function go(tab){
  state.tab = tab;
  $$('.screen').forEach(s=>s.classList.toggle('active', s.id === 's-'+tab));
  $$('#nav button[data-tab]').forEach(b=>b.classList.toggle('active', b.dataset.tab === tab));
  if(tab === 'search') setTimeout(()=>$('#searchInput').focus(), 120);
}

/* ---------- eventos ---------- */
$$('#nav button[data-tab]').forEach(b => b.onclick = () => go(b.dataset.tab));
$('#closePlayer').onclick = closePlayer;
$('#miniPlayer').onclick = (e) => {
  if(e.target.closest('#mPlay')){ e.stopPropagation(); play(); return; }
  openPlayer();
};
$('#playBtn').onclick = () => play();
$('#nextBtn').onclick = next;
$('#prevBtn').onclick = prev;
$('#likeBtn').onclick = () => {
  const on = toggleLike(cur());
  $('#likeBtn').classList.toggle('on', on);
  toast(on ? 'Añadida a tus me gusta' : 'Quitada de tus me gusta');
};
$('#addFolderBtn').onclick = () => {
  const name = prompt('Nombre de la nueva carpeta');
  if(name && name.trim()){
    state.folders.push({ name: name.trim() });
    saveFolders();
    buildLibrary();
    toast('Carpeta creada: ' + name.trim());
  }
};
$('#shuffleBtn').onclick = e => {
  state.shuffle = !state.shuffle;
  e.currentTarget.classList.toggle('on', state.shuffle);
  toast(state.shuffle ? 'Reproducción aleatoria activada' : 'Reproducción aleatoria desactivada');
};
$('#repeatBtn').onclick = e => {
  state.repeat = !state.repeat;
  e.currentTarget.classList.toggle('on', state.repeat);
  toast(state.repeat ? 'Repetir canción activado' : 'Repetir desactivado');
};
$('#seekBar').onclick = e => {
  const r = e.currentTarget.getBoundingClientRect();
  seekTo(Math.max(0, Math.min(1,(e.clientX-r.left)/r.width)) * cur().dur);
};
$$('#searchTabs .tab').forEach(t => t.onclick = () => {
  $$('#searchTabs .tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
});
$('#searchInput').oninput = e => {
  const v = e.target.value;
  $('#searchBar').classList.toggle('typing', !!v);
  $('#clearSearch').style.display = v ? '' : 'none';
  runSearch(v);
};
$('#clearSearch').onclick = () => {
  $('#searchInput').value = ''; $('#clearSearch').style.display='none';
  $('#searchBar').classList.remove('typing'); runSearch('');
};
$('#cancelSearch').onclick = () => { $('#clearSearch').onclick(); $('#searchInput').blur(); };
$('#clearRecents').onclick = e => { e.preventDefault(); state.recents = []; buildSearchIdle(); };
$$('[data-goto]').forEach(a => a.onclick = e => { e.preventDefault(); go(a.dataset.goto); });

/* ---------- arranque ---------- */
buildHome(); buildSearchIdle(); buildLibrary();
$('#playBtn').innerHTML = ICON.playBig;
renderTrack();

/* ---------- Pull to Refresh ---------- */
let ptrStartY = 0;
let ptrRefreshing = false;
const homeEl = $('#s-home');
const ptrInd = $('#ptr-indicator');
const ptrText = $('#ptr-text');

homeEl.addEventListener('touchstart', e => {
  if (homeEl.scrollTop === 0) ptrStartY = e.touches[0].clientY;
  else ptrStartY = 0;
}, {passive: true});

homeEl.addEventListener('touchmove', e => {
  if (!ptrStartY || ptrRefreshing) return;
  const dy = e.touches[0].clientY - ptrStartY;
  if (dy > 0) {
    ptrInd.style.transition = 'none';
    ptrInd.style.height = Math.min(dy * 0.4, 60) + 'px';
    ptrText.style.opacity = Math.min(dy / 100, 1);
    if (dy > 120) ptrText.textContent = 'Suelta para refrescar';
    else ptrText.textContent = 'Baja para refrescar';
    if (e.cancelable) e.preventDefault();
  }
}, {passive: false});

homeEl.addEventListener('touchend', async e => {
  if (!ptrStartY || ptrRefreshing) return;
  ptrStartY = 0;
  const h = parseInt(ptrInd.style.height || 0);
  ptrInd.style.transition = 'height 0.2s';
  if (h > 40) {
    ptrRefreshing = true;
    ptrInd.style.height = '40px';
    ptrText.textContent = 'Refrescando...';
    await buildHome(true);
    ptrInd.style.height = '0';
    ptrText.style.opacity = '0';
    setTimeout(() => ptrRefreshing = false, 300);
  } else {
    ptrInd.style.height = '0';
    ptrText.style.opacity = '0';
  }
});

/* ---------- Deslizar hacia abajo para cerrar el reproductor ---------- */
(function(){
  const player = $('#player');
  const inner = $('.player-inner');
  let startY = 0, dy = 0, dragging = false;
  const THRESHOLD = 110;

  player.addEventListener('touchstart', e => {
    if (inner.scrollTop > 0) { dragging = false; return; }
    startY = e.touches[0].clientY;
    dy = 0;
    dragging = true;
    player.style.transition = 'none';
  }, {passive:true});

  player.addEventListener('touchmove', e => {
    if (!dragging) return;
    dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      player.style.transform = `translateY(${dy}px)`;
      if (e.cancelable) e.preventDefault();
    }
  }, {passive:false});

  player.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    player.style.transition = '';
    player.style.transform = '';
    if (dy > THRESHOLD) closePlayer();
    dy = 0;
  });
})();
