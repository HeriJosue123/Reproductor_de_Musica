<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reproductor — Shell de diseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;
  --surface:#1e1e1e;
  --surface-2:#2a2a2a;
  --line:#3a3a3c;
  --text:#ffffff;
  --muted:#98989d;
  --accent:#fbd9cf;
  --accent-2:#ffb4a2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background:var(--bg); color:var(--text); overflow:hidden;
  user-select:none; -webkit-tap-highlight-color:transparent;
}
body{
  background:#05040a;
  color:var(--text);
  font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ---------- Marco de teléfono (solo para la demo en escritorio) ---------- */
.phone{
  position:relative;width:390px;height:844px;max-width:100vw;max-height:100vh;
  background:var(--bg);overflow:hidden;
  border-radius:38px;box-shadow:0 40px 90px rgba(0,0,0,.7), 0 0 0 1px #241f33;
}
@media (max-width:430px),(max-height:860px){
  .phone{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none}
}

/* ---------- Pantallas ---------- */
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:max(env(safe-area-inset-top),10px) 0 calc(var(--nav-h) + 78px);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .22s ease, transform .22s ease;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.active{opacity:1;pointer-events:auto;transform:none}

.pad{padding:0 20px}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1.title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:6px 0 22px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:26px 0 14px}
.section-head h2{font-size:17px;font-weight:700;letter-spacing:-.01em}
.section-head a{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none}

/* carátulas */
.art{border-radius:10px;position:relative;overflow:hidden;flex:none;background:#211d2e}
.art::after{content:'';position:absolute;inset:0;z-index:0;background:
  radial-gradient(circle at 30% 25%, rgba(255,255,255,.22), transparent 55%),
  linear-gradient(150deg, var(--c1), var(--c2));}
.art .art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.art.round{border-radius:50%}

/* ---------- Inicio ---------- */
.apphead{text-align:center;padding:6px 20px 4px}
.apphead h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
.apphead p{color:var(--muted);font-size:13px;margin-top:4px}
.hero-greet{font-size:24px;font-weight:800;letter-spacing:-.02em}
.hero-sub{color:var(--muted);font-size:14px;margin-top:4px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.quick button{
  display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:10px;padding:0;height:56px;color:var(--text);font:inherit;font-size:13px;font-weight:700;
  overflow:hidden;text-align:left;cursor:pointer;transition:background .15s;
}
.quick button:hover{background:#232032}
.quick .art{width:56px;height:56px;border-radius:0}
.shelf{display:flex;gap:14px;overflow-x:auto;padding:2px 20px 4px;scrollbar-width:none}
.shelf::-webkit-scrollbar{display:none}
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 24px 24px; }
.quick-grid > div { display:flex; align-items:center; background:var(--surface-2); border-radius:4px; overflow:hidden; gap:8px; padding-right:12px; cursor:pointer; }
.quick-grid > div .art { width:56px; height:56px; border-radius:0; flex-shrink:0; }
.card{width:136px;flex:none;cursor:pointer}
.card .art{width:136px;height:136px;box-shadow:0 8px 22px rgba(0,0,0,.5)}
.card h3{font-size:13.5px;font-weight:700;margin-top:10px;line-height:1.3}
.card p{font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- Listas de canciones ---------- */
.row{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;transition:background .15s}
.row:hover{background:rgba(255,255,255,.035)}
.row .art{width:44px;height:44px}
.row .meta{flex:1;min-width:0}
.row .meta h4{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .meta p{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .dur{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.row .kebab{color:var(--muted);padding:4px;display:flex}
.row.playing .meta h4{color:var(--accent)}

/* ---------- Buscar ---------- */
.searchbar{display:flex;align-items:center;gap:10px;padding:6px 20px 0}
.searchbar .field{
  flex:1;display:flex;align-items:center;gap:9px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:11px;padding:0 12px;height:44px;
}
.searchbar input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font:inherit;font-size:14.5px;
}
.searchbar input::placeholder{color:var(--muted)}
.searchbar .cancel{background:none;border:none;color:var(--accent);font:inherit;font-size:15px;font-weight:600;cursor:pointer;display:none}
.searchbar.typing .cancel{display:block}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;padding:6px}

.tabs{display:flex;gap:8px;overflow-x:auto;padding:16px 20px 4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);
  font:inherit;font-size:13px;font-weight:700;padding:7px 15px;border-radius:999px;cursor:pointer;
  transition:.15s;
}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px}
.chip{
  display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:7px 12px;font-size:13px;font-weight:600;color:#cfc9dd;cursor:pointer;
}
.chip .x{color:var(--muted);display:flex}

.trend{display:flex;gap:12px;overflow-x:auto;padding:2px 20px;scrollbar-width:none}
.trend::-webkit-scrollbar{display:none}
.trend-item{width:104px;flex:none;position:relative;cursor:pointer}
.trend-item .art{width:104px;height:104px}
.trend-item .rank{
  position:absolute;top:6px;left:6px;z-index:2;width:20px;height:20px;border-radius:6px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:grid;place-items:center;
  font-size:11px;font-weight:800;
}
.trend-item h4{font-size:12.5px;font-weight:700;margin-top:8px;line-height:1.25}
.trend-item p{font-size:11.5px;color:var(--muted);margin-top:2px}

.artist-row{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer}
.artist-row .art{width:46px;height:46px;border-radius:50%}
.artist-row .meta h4{font-size:14.5px;font-weight:600}
.artist-row .meta p{font-size:12.5px;color:var(--muted);margin-top:2px}
.artist-row .chev{margin-left:auto;color:var(--muted);display:flex}

.empty{padding:60px 30px;text-align:center;color:var(--muted)}
.empty h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.5}

/* ---------- Mini reproductor ---------- */
.mini{
  position:fixed; bottom:96px; left:50%; transform:translate(-50%, 150%);
  width:calc(100% - 48px); max-width:400px; height:64px;
  background:var(--surface-2); border-radius:32px;
  display:flex; align-items:center; padding:0 8px 0 8px; z-index:99;
  transition:transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.mini.up{ transform:translate(-50%, 0); }
.mini .art{width:40px;height:40px}
.mini .meta{flex:1;min-width:0}
.mini .meta h4{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .meta p{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini .mini-bar{position:absolute;left:8px;right:8px;bottom:4px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.mini .mini-bar i{display:block;height:100%;background:var(--accent);width:0}

/* ---------- Nav inferior ---------- */
.nav{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); width:calc(100% - 48px); max-width:400px;
  background:var(--surface); border-radius:32px; display:flex; justify-content:space-around;
  padding:12px 0; z-index:100;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
nav button {
  background:transparent; border:none; color:var(--muted); padding:8px 16px; border-radius:16px; transition:0.2s;
}
nav button.active {
  color:var(--text); background:var(--surface-2);
}
.nav button{
  background:none;border:none;color:var(--muted);font:inherit;font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;width:56px;
  transition:color .15s;
}
.nav button.active{color:var(--accent)}
.nav .fab{
  width:52px;height:52px;border-radius:50%;margin-top:-14px;
  background:linear-gradient(150deg,var(--accent),var(--accent-2));
  color:#fff;display:grid;place-items:center;gap:0;
  box-shadow:0 6px 20px var(--accent-glow);
}
.nav .fab.active{color:#fff}
.home-ind{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:120px;height:4px;border-radius:4px;background:rgba(255,255,255,.28);z-index:40;pointer-events:none}

/* ---------- Reproductor a pantalla completa ---------- */
.player{
  position:absolute;inset:0;z-index:150;background:#000;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.85,.3,1);
  overflow:hidden;
}
.player.open{transform:none}
.player-inner{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;padding-bottom:24px}
.player-inner::-webkit-scrollbar{display:none}

.player-top{display:flex;flex-direction:column;align-items:center;padding:max(env(safe-area-inset-top),32px) 20px 16px}
.player-top .label{font-size:14px;font-weight:700;letter-spacing:0;color:#fff;margin-bottom:4px}
.player-top .sub{font-size:13px;font-weight:500;color:rgba(255,255,255,0.6)}
.player-top-down{position:absolute;left:20px;top:max(env(safe-area-inset-top),32px);color:#fff;background:none;border:none;padding:4px;cursor:pointer}

.stage{padding:0 24px 24px;display:flex;justify-content:center;margin-top:auto}
.cover-square{width:100%;max-width:320px;aspect-ratio:1;border-radius:18px;object-fit:cover;box-shadow:0 12px 40px rgba(0,0,0,0.5);transition: transform 0.3s ease, box-shadow 0.3s ease;}
.player.playing .cover-square {transform: scale(1.03);box-shadow: 0 16px 50px rgba(0,0,0,0.7);}

.track-info{display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px}
.track-info .txt{flex:1;min-width:0}
.track-info h2{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.2;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-info .artist{font-size:15px;font-weight:500;color:rgba(255,255,255,0.6);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-actions{display:flex;gap:8px}
.track-actions button{width:42px;height:42px;border-radius:21px;background:#1a1a1a;border:none;color:#fff;display:grid;place-items:center;cursor:pointer}
.track-actions button svg{width:20px;height:20px}
.track-actions button.like.on{color:#fcd4d4}
.track-actions button.like.on svg{fill:currentColor}

.seek{padding:24px 24px 12px}
.seek .bar{height:6px;background:rgba(255,255,255,.14);border-radius:4px;position:relative;cursor:pointer}
.seek .bar .fill{height:100%;background:#fff;border-radius:4px;width:0}
.seek .bar .knob{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);left:0}
.seek .times{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.5);margin-top:10px;font-weight:500;font-variant-numeric:tabular-nums}

.controls{display:flex;align-items:center;justify-content:space-between;padding:0 24px 24px}
.controls button{background:none;border:none;color:#fff;cursor:pointer;display:flex;padding:6px;transition:transform 0.1s}
.controls button:active{transform:scale(0.9)}
.controls button.sm{color:rgba(255,255,255,0.5)}
.play-btn{
  width:96px;height:84px;border-radius:36px;
  background:#fcd4d4 !important;
  display:grid;place-items:center;color:#000!important;
}
.play-btn svg{width:32px;height:32px;fill:currentColor}

.util-bar{display:flex;align-items:center;justify-content:space-between;padding:0 24px 32px;gap:12px;margin-top:auto}
.util-btn{flex:1;height:48px;border-radius:24px;background:#1a1a1a;border:none;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:14px;cursor:pointer}
.util-btn.circle{flex:0 0 48px;padding:0}

/* ---------- Aviso emergente (toast) ---------- */
#toast{
  position:absolute;left:50%;bottom:calc(var(--nav-h) + 82px);
  transform:translateX(-50%) translateY(12px);
  background:rgba(20,16,32,.96);border:1px solid var(--line);color:var(--text);
  font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:11px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;max-width:82%;text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%)}

/* Reproductor de YouTube oculto (solo audio) */
#ytHost{position:absolute;width:1px;height:1px;left:-9999px;top:0;opacity:0;pointer-events:none}

/* panel inferior del reproductor */
.panel{margin-top:16px;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--line);padding:6px 0 30px;min-height:150px}
.panel-grip{width:38px;height:4px;border-radius:4px;background:#3a3450;margin:8px auto 0}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 10px}
.panel-head h3{font-size:15px;font-weight:700}
.panel-head button{background:none;border:none;color:var(--accent);font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.queue-row{display:flex;align-items:center;gap:11px;padding:8px 20px}
.queue-row .grip{color:#4b4463;display:flex;cursor:grab}
.queue-row .art{width:38px;height:38px}
.queue-row .meta{flex:1;min-width:0}
.queue-row .meta h4{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-row .meta p{font-size:11.5px;color:var(--muted);margin-top:2px}
.queue-row .dur{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}

.lyrics{padding:4px 24px 0;color:#b8b1cc;font-size:15px;line-height:1.85;font-weight:500}
.lyrics-empty{padding:8px 24px 0;color:var(--muted);font-size:13.5px;line-height:1.6}
.lyrics-empty button{
  margin-top:14px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  font:inherit;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer;
}
.lyrics-empty button:hover{border-color:var(--accent)}

svg{display:block}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="phone">

  <!-- Reproductor de YouTube oculto (motor de audio real) -->
  <div id="ytHost"></div>

  <!-- ============ INICIO ============ -->
  <section class="screen active" id="s-home">
    <div class="pad" style="padding-top: max(env(safe-area-inset-top), 24px); padding-bottom: 16px; display:flex; align-items:center; gap:8px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text);"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <h1 style="font-size:26px;font-style:italic;font-weight:900;margin:0;letter-spacing:-1px;">OpenTune</h1>
      <div style="flex:1"></div>
    </div>
    
    <div class="scroll-row" style="padding:0 24px 16px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;">
      <button class="chip-btn" style="background:var(--surface-2);color:var(--text);border:none;padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;">Entrenamiento</button>
      <button class="chip-btn" style="background:var(--surface-2);color:var(--text);border:none;padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;">Relax</button>
      <button class="chip-btn" style="background:var(--surface-2);color:var(--text);border:none;padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;">Energía</button>
      <button class="chip-btn" style="background:var(--surface-2);color:var(--text);border:none;padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;">Fiesta</button>
    </div>
<div class="pad section-head" style="margin-top:16px;"><h2>Sigue escuchando</h2></div><div class="quick-grid" id="quickGrid"></div>

    <div class="pad section-head"><h2>Escuchado recientemente</h2><a href="#" data-goto="library">Ver todo</a></div>
    <div class="shelf" id="recentShelf"></div>

    <div class="pad section-head"><h2>Tus mezclas</h2><a href="#" data-goto="library">Ver todo</a></div>
    <div class="shelf" id="mixShelf"></div>

    <div class="pad section-head"><h2>Sonó mucho esta semana</h2></div>
    <div id="homeList"></div>
  </section>

  <!-- ============ BUSCAR ============ -->
  <section class="screen" id="s-search">
    <div class="searchbar" id="searchBar">
      <div class="field">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="searchInput" type="search" placeholder="Buscar canciones, artistas, álbumes…" autocomplete="off">
        <button class="icon-btn" id="clearSearch" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" opacity=".35"/><path d="M15 9l-6 6M9 9l6 6" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <button class="icon-btn" title="Buscar por voz">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
      </button>
      <button class="icon-btn" title="Filtros">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M7 12h10M10 17h4"/></svg>
      </button>
      <button class="cancel" id="cancelSearch">Cancelar</button>
    </div>

    <div class="tabs" id="searchTabs">
      <button class="tab active">Todo</button>
      <button class="tab">Canciones</button>
      <button class="tab">Artistas</button>
      <button class="tab">Álbumes</button>
      <button class="tab">Videos</button>
    </div>

    <div id="searchIdle">
      <div class="pad section-head"><h2>Búsquedas recientes</h2><a href="#" id="clearRecents">Limpiar</a></div>
      <div class="chips" id="recentChips"></div>

      <div class="pad section-head"><h2>Historial de reproducción</h2></div>
      <div class="trend" id="historyRow"></div>
    </div>

    <div id="searchResults" style="display:none"></div>
  </section>

  <!-- ============ BIBLIOTECA ============ -->
  <section class="screen" id="s-library">
    <div class="pad" style="padding-top:12px">
      <p class="eyebrow">Guardado por ti</p>
      <h1 class="title">Biblioteca</h1>
    </div>
    <div class="tabs">
      <button class="tab active">Playlists</button>
      <button class="tab">Canciones</button>
      <button class="tab">Artistas</button>
      <button class="tab">Descargas</button>
    </div>
    <div style="height:12px"></div>
    <div id="libraryList"></div>
  </section>

  <!-- ============ PERFIL ============ -->
  <section class="screen" id="s-profile">
    <div class="pad" style="padding-top:12px">
      <p class="eyebrow">Cuenta</p>
      <h1 class="title">Perfil</h1>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:26px">

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

// --- ROTACIÓN DE API KEYS PARA LA APK ---
const YOUTUBE_KEYS = [
  'AIzaSyCWciQ2xa2DkGR9eQBnArMi2lp_WR9zDf0',
  'AIzaSyBpbBeoRdOdBKBcwwL2Vk2ayxkBGmqqi0w',
  'AIzaSyCSnJhjXLaTJ9LYfkujDJt6a-Pjy29IvNA',
  'AIzaSyBqiKrUmPKeMqB7Y3K9jc4Kjs8DUYd-YQw',
  'AIzaSyC3X8NcrqgUULufh40XGLICohRmVSziKZk'
];
let currentKeyIndex = 0;

async function searchYouTube(q) {
  if (!YOUTUBE_KEYS.length || YOUTUBE_KEYS[0] === 'TU_API_KEY_1') {
    return { error: 'Falta configurar las YOUTUBE_KEYS en el código.' };
  }
  for (let i = 0; i < YOUTUBE_KEYS.length; i++) {
    const key = YOUTUBE_KEYS[currentKeyIndex];
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=15&safeSearch=moderate&q=${encodeURIComponent(q)}&key=${key}`;
    try {
      const r = await fetch(url);
      const data = await r.json();
      if (data.error) {
        console.warn('Llave falló, rotando:', currentKeyIndex, data.error.message);
        currentKeyIndex = (currentKeyIndex + 1) % YOUTUBE_KEYS.length;
        continue;
      }
      const decode = s => String(s || '').replace(/&amp;/g, '&').replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      const items = (data.items || []).filter(it => it.id && it.id.videoId).map(it => ({
        yt: it.id.videoId,
        title: decode(it.snippet.title),
        artist: decode(it.snippet.channelTitle),
        thumb: (it.snippet.thumbnails && it.snippet.thumbnails.medium && it.snippet.thumbnails.medium.url) || ''
      }));
      return { items };
    } catch(e) {
      console.warn('Error de red, rotando llave:', currentKeyIndex);
      currentKeyIndex = (currentKeyIndex + 1) % YOUTUBE_KEYS.length;
    }
  }
  return { error: 'Todas las llaves han fallado.' };
}

async function searchAppleMusic(q) {
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=15`);
    const data = await r.json();
    const items = (data.results || []).map(it => ({
      title: it.trackName,
      artist: it.artistName,
      thumb: it.artworkUrl100 ? it.artworkUrl100.replace('100x100bb', '600x600bb') : '',
      yt: null // se obtendrá bajo demanda
    }));
    return { items };
  } catch(e) {
    return { error: 'Error al conectar con Apple Music.' };
  }
}

const artEl = (t, cls='') => {
  const d = document.createElement('div');
  d.className = 'art ' + cls;
  d.style.setProperty('--c1', t.c1); d.style.setProperty('--c2', t.c2);
  if (t.cover) {
    const img = document.createElement('img');
    img.className = 'art-img'; img.alt = '';
    img.src = t.cover;
    d.append(img);
  } else if(t.yt){
    // Carátula real: miniatura del video de YouTube (con degradado de respaldo detrás)
    const img = document.createElement('img');
    img.className = 'art-img'; img.alt = '';
    const hi = cls.includes('cover');           // carátula grande del reproductor
    const srcs = hi ? ['maxresdefault','hqdefault','0'] : ['mqdefault','hqdefault','0'];
    let k = 0;
    const set = () => img.src = 'https://i.ytimg.com/vi/' + t.yt + '/' + srcs[k] + '.jpg';
    img.onload = () => { if(img.naturalWidth === 120 && k < srcs.length - 1){ k++; set(); } };
    img.onerror = () => { k++; if(k < srcs.length) set(); else img.remove(); };
    set();
    d.append(img);
  }
  return d;
};

const ICON = {

function songRow(t, i, opts={}){
  const r = document.createElement('div');
  r.className = 'row' + (i === state.idx ? ' playing' : '');
  r.append(artEl(t));
  const m = document.createElement('div');
  m.className = 'meta';
  m.innerHTML = `<h4></h4><p></p>`;
  m.querySelector('h4').textContent = t.title;
  m.querySelector('p').textContent = t.artist;
  r.append(m);
  const d = document.createElement('span');
  d.className = 'dur'; d.textContent = fmt(t.dur);
  r.append(d);
  const k = document.createElement('span');
  k.className = 'kebab'; k.innerHTML = ICON.kebab;
  k.onclick = e => { e.stopPropagation(); addToQueue(i); };
  r.append(k);
  r.onclick = () => { state.idx = i; state.t = 0; play(true); openPlayer(); };
  return r;
}

function addToQueue(i){
  if(!state.queue.includes(i)) state.queue.push(i);

}

function buildSearchIdle(){
  const chips = $('#recentChips'); chips.innerHTML = '';
  state.recents.forEach(term=>{
    const c = document.createElement('div'); c.className='chip';
    const s = document.createElement('span'); s.textContent = term;
    const x = document.createElement('span'); x.className='x'; x.innerHTML = ICON.x;
    x.onclick = e => { e.stopPropagation(); state.recents = state.recents.filter(r=>r!==term); buildSearchIdle(); };
    c.append(s,x);
    c.onclick = () => { $('#searchInput').value = term; runSearch(term); };
    chips.append(c);
  });

  const tr = $('#historyRow'); 
  if(!tr) return;
  tr.innerHTML = '';
  if(!state.history || state.history.length === 0) {
    tr.innerHTML = '<div style="padding:0 24px;color:var(--muted)">No has escuchado nada aún.</div>';
    return;
  }
  state.history.slice(0,10).forEach((t)=>{
    const d = document.createElement('div'); d.className='trend-item';
    d.append(artEl(t));
    const h = document.createElement('h4'); h.textContent = t.title;
    const p = document.createElement('p'); p.textContent = t.artist;
    d.append(h,p);
    d.onclick = () => { 
      let idx = LIB.findIndex(x => x.yt === t.yt);
      if(idx === -1) { idx = LIB.length; LIB.push(t); }
      state.idx = idx; state.t=0; play(true); openPlayer(); 
    };
    tr.append(d);
  });
}

let searchSeq = 0, ytTimer = null;
function runSearch(q){
  const res = $('#searchResults'), idle = $('#searchIdle');
  if(!q.trim()){ res.style.display='none'; idle.style.display=''; clearTimeout(ytTimer); return; }
  
  if(!state.recents.includes(q.trim())) {
    state.recents.unshift(q.trim());
    if(state.recents.length > 10) state.recents.pop();
    buildSearchIdle();
  }
  
  idle.style.display='none'; res.style.display=''; res.innerHTML='';
  const term = q.toLowerCase();
  const hits = LIB.filter(t => (t.title+' '+t.artist).toLowerCase().includes(term));
  const artists = [...new Set(LIB.filter(t=>t.artist.toLowerCase().includes(term)).map(t=>t.artist.split(',')[0]))];

  if(artists.length){
    res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>Artistas</h2></div>`);
    artists.slice(0,3).forEach(a=>{
      const t = LIB.find(x=>x.artist.startsWith(a));
      const r = document.createElement('div'); r.className='artist-row';
      r.append(artEl(t));
      const m = document.createElement('div'); m.className='meta';
      m.innerHTML = '<h4></h4><p>Artista</p>';
      m.querySelector('h4').textContent = a;
      r.append(m);
      const c = document.createElement('span'); c.className='chev'; c.innerHTML = ICON.chev;
      r.append(c);
      res.append(r);
    });
  }
  if(hits.length){
    res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>En tu biblioteca</h2></div>`);
    hits.slice(0,8).forEach(t => res.append(songRow(t, LIB.indexOf(t))));
  }
  // Búsqueda en vivo en YouTube (con debounce para no gastar cuota de más)
  scheduleYT(q);
}

function scheduleYT(q){
  clearTimeout(ytTimer);
  const seq = ++searchSeq;
  ytTimer = setTimeout(() => fetchYT(q, seq), 350);
}

async function fetchYT(q, seq){
  const res = $('#searchResults');
  res.insertAdjacentHTML('beforeend', `<div class="pad section-head"><h2>En Apple Music</h2></div>`);
  const loading = document.createElement('div');
  loading.className = 'empty'; loading.style.padding = '24px';
  loading.innerHTML = '<p>Buscando en catálogo oficial...</p>';
  res.append(loading);
  try{
    const data = await searchAppleMusic(q);
    if(seq !== searchSeq) return;
    loading.remove();
    if(data.error){
      const e = document.createElement('div'); e.className='empty'; e.style.padding='18px 24px';
      e.innerHTML = `<p>${data.error}</p>`;
      res.append(e); return;
    }
    if(!data.items || !data.items.length){
      const e = document.createElement('div'); e.className='empty'; e.style.padding='18px 24px';
      e.innerHTML = '<p>Sin resultados en Apple Music.</p>';
      res.append(e); return;
    }
    data.items.forEach(it => res.append(ytRow({ yt:null, title:it.title, artist:it.artist, dur:0, cover:it.thumb })));
  }catch(e){
    if(seq !== searchSeq) return;
    loading.remove();
  }
}

function ytRow(t){
  const r = document.createElement('div'); r.className='row';
  r.append(artEl(t));

  m.querySelector('h4').textContent = t.title;
  m.querySelector('p').textContent = t.artist;
  r.append(m);
  const k = document.createElement('span'); k.className='kebab'; k.innerHTML = ICON.play;
  r.append(k);
  r.onclick = () => playExternal(t);
  return r;
}

// Reproduce una canción encontrada en Apple Music (la agrega a la biblioteca si es nueva)
function playExternal(t){
  let i = LIB.findIndex(x => x.title === t.title && x.artist === t.artist);
  if(i < 0){
    const g = grad();
    t.c1 = g[0]; t.c2 = g[1]; t.album = t.title; t.dur = t.dur || 0;
    LIB.push(t); i = LIB.length - 1;
  }
  loadTrack(i, true); openPlayer();
}

function buildLibrary(){
  const el = $('#libraryList'); el.innerHTML='';
  PLAYLISTS.forEach((p,i)=>{
    const t = LIB[i];
    const r = document.createElement('div'); r.className='row';
    const a = artEl(t); a.style.width='52px'; a.style.height='52px';
    r.append(a);
    const m = document.createElement('div'); m.className='meta';
    m.innerHTML = '<h4></h4><p></p>';
    m.querySelector('h4').textContent = p.name;
    m.querySelector('p').textContent = `Playlist · ${p.n} canciones`;
    r.append(m);
    const c = document.createElement('span'); c.className='kebab'; c.innerHTML = ICON.chev;
    r.append(c);
    el.append(r);
  });
}

function buildProfile(){
  const items = [
    ['Calidad de audio','Alta · solo con Wi-Fi'],
    ['Descargas','12 canciones · 84 MB'],
    ['Reproducción','Silencio entre pistas: 2 s'],
    ['Historial','Ver y borrar'],
    ['Conexión con YouTube','Conectado · reproducción por IFrame API'],
    ['Acerca de','Versión 0.2 — audio real de prueba']
  ];
  const el = $('#profileList'); el.innerHTML='';
  items.forEach(([a,b])=>{
    const r = document.createElement('div'); r.className='row';
    const m = document.createElement('div'); m.className='meta';
    m.innerHTML = '<h4></h4><p></p>';
    m.querySelector('h4').textContent = a;
    m.querySelector('p').textContent = b;
    r.append(m);
    const c = document.createElement('span'); c.className='kebab'; c.innerHTML = ICON.chev;
    r.append(c);
    el.append(r);
  });
}

/* ---------- reproductor ---------- */
function renderStage(){
  const t = cur(), st = $('#stage');
  st.innerHTML = '';
  const a = artEl(t,'cover-square');
  st.append(a);
}

function buildWave(){
  const w = $('#wave');
  if(w.childElementCount) return;
  for(let i=0;i<64;i++){
    const b = document.createElement('i');
    const h = 12 + Math.abs(Math.sin(i*.7)*Math.cos(i*.23))*32;
    b.style.height = h.toFixed(1)+'px';
    w.append(b);
  }
  w.onclick = e => {
    const r = w.getBoundingClientRect();
    seekTo(Math.max(0, Math.min(1,(e.clientX-r.left-24)/(r.width-48))) * cur().dur);
  };
}

function renderPanel(){}

function renderTrack(){
  const t = cur();
  $('#pTitle').textContent = t.title;
  $('#pArtist').textContent = t.artist;
  $('#pTopArtist').textContent = t.artist;
  $('#tTot').textContent = fmt(t.dur);
  $('#likeBtn').classList.toggle('on', state.liked.has(state.idx));
  renderStage(); renderPanel();
  buildHome();
  if($('#searchInput').value) runSearch($('#searchInput').value);
  paint();
}

/* Solo pinta la barra de progreso, el anillo y la onda según state.t */
function paint(){
  const t = cur();
  const p = t.dur ? Math.min(1, state.t / t.dur) : 0;
  $('#seekFill').style.width = (p*100)+'%';
  $('#seekKnob').style.left = (p*100)+'%';
  $('#tCur').textContent = fmt(state.t);
}

/* Se ejecuta cada 250 ms mientras suena: lee el tiempo real de YouTube */
function tickReal(){
  const t = cur();
  if(yt && ytReady && t.yt && typeof yt.getCurrentTime === 'function'){
    try{
      const ct = yt.getCurrentTime();
      if(!isNaN(ct)) state.t = ct;
      const d = yt.getDuration();
      if(d && Math.abs(d - t.dur) > 1){ t.dur = d; $('#tTot').textContent = fmt(d); }
    }catch(e){}
  } else {
    state.t = Math.min(t.dur, state.t + 0.25);
    if(state.t >= t.dur){ next(); return; }
  }
  paint();
}

/* Actualiza solo la UI de reproducción (no manda comandos a YouTube) */
function setPlaying(on){
  state.playing = on;
  $('#playBtn').innerHTML = on ? ICON.pauseBig : ICON.playBig;
  if(on) {
    $('#player').classList.add('playing');
  } else {
    $('#player').classList.remove('playing');
  }
  clearInterval(state.timer);
  if(on) state.timer = setInterval(tickReal, 250);
}

/* Carga una canción (por índice) y opcionalmente la reproduce */
async function loadTrack(i, autoplay=true){
  state.idx = i; state.t = 0;
  const t = cur();
  
  if(!state.history) state.history = [];
  state.history = state.history.filter(x => x.title !== t.title);
  state.history.unshift(t);
  if(state.history.length > 20) state.history.pop();
  buildSearchIdle();

  renderTrack();
  
  if (!t.yt) {
    toast('Cargando audio...');
    const ytData = await searchYouTube(t.artist + ' ' + t.title + ' audio oficial');
    if (ytData.items && ytData.items.length > 0) {
      t.yt = ytData.items[0].yt;
    } else {
      toast('No se encontró audio para: ' + t.title);
      setTimeout(next, 2000);
      return;
    }
  }
  
  if(t.yt) loadYT(t.yt, autoplay);
  setPlaying(autoplay);
}

/* Alternar play/pausa de la canción actual */
function play(on){
  const want = on !== undefined ? on : !state.playing;
  const t = cur();
  // Si se pide reproducir una canción que aún no está cargada, la carga
  if(want && t.yt && state.loadedId !== t.yt){ loadTrack(state.idx, true); return; }
  if(yt && ytReady && t.yt){ want ? yt.playVideo() : yt.pauseVideo(); }
  setPlaying(want);
}

/* Saltar a un punto (en segundos) de la canción actual */
function seekTo(sec){
  const t = cur();
  state.t = Math.max(0, Math.min(t.dur || 0, sec));
  if(yt && ytReady && t.yt){ try{ yt.seekTo(state.t, true); }catch(e){} }
  paint();
}

async function next(){
  if(state.repeat) { loadTrack(state.idx, true); return; }
  if(state.shuffle) { loadTrack(Math.floor(Math.random()*LIB.length), true); return; }
  
  if(state.idx === LIB.length - 1) {
    toast('Buscando similares...');
    const artist = cur().artist || cur().title.split('-')[0] || 'Mix';
    try {
      const data = await searchAppleMusic(artist + ' oficial');
      if(data.items && data.items.length) {
        let added = false;
        for(let it of data.items) {
          if(!LIB.find(x => x.title === it.title && x.artist === it.artist)) {
            LIB.push(mk(it.title, it.artist, 0, null, it.thumb));
            added = true;
          }
        }
        if(added) {
          loadTrack(state.idx + 1, true);
          return;
        }
      }
    } catch(e) {}
  }
  loadTrack((state.idx + 1) % LIB.length, true);
}
function prev(){
  if(state.t > 4){ seekTo(0); return; }
  loadTrack((state.idx-1+LIB.length)%LIB.length, true);
}
const openPlayer = () => $('#player').classList.add('open');
const closePlayer = () => $('#player').classList.remove('open');

/* ---------- Aviso emergente ---------- */
function toast(msg){
  let el = $('#toast');
  if(!el){ el = document.createElement('div'); el.id = 'toast'; document.querySelector('.phone').append(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove('show'), 2800);
}

/* ---------- Motor de audio: YouTube IFrame API ---------- */
let yt = null, ytReady = false, pendingId = null;
window.onYouTubeIframeAPIReady = function(){
  yt = new YT.Player('ytHost', {
    height:'1', width:'1',
    playerVars:{ playsinline:1, controls:0, disablekb:1, rel:0, origin: window.location.origin },
    events:{
      onReady: () => { ytReady = true; if(pendingId){ loadYT(pendingId, true); pendingId = null; } },
      onStateChange: onYTState,
      onError: onYTError
    }
  });
};
function loadYT(id, autoplay){
  state.loadedId = id;
  if(!yt || !ytReady){ pendingId = id; return; }
  autoplay ? yt.loadVideoById(id) : yt.cueVideoById(id);
}
function onYTState(e){
  if(e.data === YT.PlayerState.PLAYING){
    const d = yt.getDuration();
    if(d && cur()){ cur().dur = d; $('#tTot').textContent = fmt(d); }
    setPlaying(true);
  } else if(e.data === YT.PlayerState.PAUSED){
    setPlaying(false);
  } else if(e.data === YT.PlayerState.ENDED){
    next();
  }
}
function onYTError(){
  toast('No se pudo reproducir «' + cur().title + '», paso a la siguiente…');
  setTimeout(next, 1400);
}

/* ---------- navegación ---------- */
function go(tab){
  state.tab = tab;
  $$('.screen').forEach(s=>s.classList.toggle('active', s.id === 's-'+tab));
  $$('#nav button[data-tab]').forEach(b=>b.classList.toggle('active', b.dataset.tab === tab));
  if(tab === 'search') setTimeout(()=>$('#searchInput').focus(), 120);
}

/* ---------- eventos ---------- */
$$('#nav button[data-tab]').forEach(b => b.onclick = () => go(b.dataset.tab));
$('#fabBtn').onclick = openPlayer;
$('#closePlayer').onclick = closePlayer;
$('#playBtn').onclick = () => play();
$('#nextBtn').onclick = next;
$('#prevBtn').onclick = prev;
$('#likeBtn').onclick = () => {
  const on = !state.liked.has(state.idx);
  on ? state.liked.add(state.idx) : state.liked.delete(state.idx);
  $('#likeBtn').classList.toggle('on', on);
  toast(on ? 'Añadida a tus me gusta' : 'Quitada de tus me gusta');
};
$('#shuffleBtn').onclick = e => {
  state.shuffle = !state.shuffle;
  e.currentTarget.classList.toggle('on', state.shuffle);
  toast(state.shuffle ? 'Reproducción aleatoria activada' : 'Reproducción aleatoria desactivada');
};
$('#repeatBtn').onclick = e => {
  state.repeat = !state.repeat;
  e.currentTarget.classList.toggle('on', state.repeat);
  toast(state.repeat ? 'Repetir canción activado' : 'Repetir desactivado');
};
$('#seekBar').onclick = e => {
  const r = e.currentTarget.getBoundingClientRect();
  seekTo(Math.max(0, Math.min(1,(e.clientX-r.left)/r.width)) * cur().dur);
};
$$('#searchTabs .tab').forEach(t => t.onclick = () => {
  $$('#searchTabs .tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
});
$('#searchInput').oninput = e => {
  const v = e.target.value;
  $('#searchBar').classList.toggle('typing', !!v);
  $('#clearSearch').style.display = v ? '' : 'none';
  runSearch(v);
};
$('#clearSearch').onclick = () => {
  $('#searchInput').value = ''; $('#clearSearch').style.display='none';
  $('#searchBar').classList.remove('typing'); runSearch('');
};
$('#cancelSearch').onclick = () => { $('#clearSearch').onclick(); $('#searchInput').blur(); };
$('#clearRecents').onclick = e => { e.preventDefault(); state.recents = []; buildSearchIdle(); };
$$('[data-goto]').forEach(a => a.onclick = e => { e.preventDefault(); go(a.dataset.goto); });

/* ---------- arranque ---------- */
buildHome(); buildSearchIdle(); buildLibrary(); buildProfile();
$('#playBtn').innerHTML = ICON.playBig;
renderTrack();
</script>
<!-- API de reproducción de YouTube (motor de audio) -->
<script src="https://www.youtube.com/iframe_api"></script>
